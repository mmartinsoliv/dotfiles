# ============================================
# Tmux Configuration
# ============================================

# --------------------------------------------
# General Settings
# --------------------------------------------

# Set prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Set default terminal
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'

# Set escape time to 0 for faster key response
set -sg escape-time 0

# Set history limit
set -g history-limit 50000

# Enable focus events
set -g focus-events on

# Set base index to 1 for windows and panes
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Monitor window activity
setw -g monitor-activity on
set -g visual-activity off

# Enable automatic window renaming
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Set window title
set -g set-titles on
set -g set-titles-string '#H ❐ #S ● #I #W'

# --------------------------------------------
# Key Bindings
# --------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display 'Config reloaded!'

# Split panes using | and -
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# New window
bind c new-window -c '#{pane_current_path}'

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Pane navigation with Vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Zoom pane
bind z resize-pane -Z

# Copy mode
bind Enter copy-mode
bind b list-buffers
bind p paste-buffer
bind P choose-buffer

# Copy mode with Vim keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Sync panes
bind s setw synchronize-panes

# --------------------------------------------
# Tokyo Night Theme
# --------------------------------------------

# Status bar
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position bottom
set -g status-style bg=#1a1b26,fg=#a9b1d6

# Status bar left
set -g status-left-length 100
set -g status-left '#[fg=#7aa2f7,bold] #S #[fg=#414868]│ #[fg=#f7768e,bold]#{?synchronize-panes,SYNC ,}#[default]'

# Status bar right
set -g status-right-length 100
set -g status-right '#[fg=#7aa2f7]#{?client_prefix,#[bg=#bb9af7]#[fg=#1a1b26] PREFIX ,}#[fg=#414868]│ #[fg=#a9b1d6]%Y-%m-%d #[fg=#414868]│ #[fg=#7aa2f7]%H:%M #[fg=#414868]│ #[fg=#e0af68]#(whoami)@#H '

# Window status
setw -g window-status-format '#[fg=#565f89] #I #[fg=#a9b1d6]#W '
setw -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7] #I #[fg=#1a1b26,bold]#W '
setw -g window-status-separator ''

# Pane borders
set -g pane-border-style fg=#414868
set -g pane-active-border-style fg=#7aa2f7

# Message style
set -g message-style bg=#1a1b26,fg=#7aa2f7
set -g message-command-style bg=#1a1b26,fg=#7aa2f7

# Copy mode style
setw -g mode-style bg=#283457,fg=#c0caf5

# --------------------------------------------
# TPM (Tmux Plugin Manager)
# --------------------------------------------

# Set TPM path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '$HOME/.tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank settings
set -g @yank_with_mouse 'on'
set -g @yank_selection_mouse 'clipboard'

# --------------------------------------------
# Initialize TPM
# --------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
