# ============================================
# Kitty Configuration
# ============================================

# --------------------------------------------
# Fonts
# --------------------------------------------

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size 13.0

# Enable font features
font_features JetBrainsMonoNerdFont-Bold +zero +ss01 +ss02
font_features JetBrainsMonoNerdFont-Italic +zero +ss01 +ss02

# Disable ligatures
disable_ligatures never

# --------------------------------------------
# Cursor
# --------------------------------------------

cursor #c0caf5
cursor_text_color #1a1b26
cursor_shape block
cursor_blink_interval 0

# --------------------------------------------
# Scrollback
# --------------------------------------------

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# --------------------------------------------
# Mouse
# --------------------------------------------

mouse_hide_wait 3.0
focus_follows_mouse no

# --------------------------------------------
# Performance
# --------------------------------------------

repaint_delay 10
input_delay 3
sync_to_monitor yes

# --------------------------------------------
# Window Layout
# --------------------------------------------

remember_window_size  yes
initial_window_width  120c
initial_window_height 35c
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0
draw_minimal_borders yes
window_margin_width 0
window_padding_width 4
placement_strategy center
active_border_color #7aa2f7
inactive_border_color #414868
bell_border_color #e0af68

# --------------------------------------------
# Tabs
# --------------------------------------------

tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_style powerline
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┃"
tab_powerline_style slanted
tab_title_template "{title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}"
active_tab_title_template none
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
active_tab_font_style   bold
inactive_tab_foreground #a9b1d6
inactive_tab_background #24283b
inactive_tab_font_style normal
tab_bar_background #1a1b26

# --------------------------------------------
# Colors (Tokyo Night Storm)
# --------------------------------------------

foreground #c0caf5
background #1a1b26
background_opacity 1.0
background_image none
dynamic_background_opacity no

# Selection
selection_foreground none
selection_background #283457

# Color scheme
# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# URL
url_color #73daca
url_style curly

# --------------------------------------------
# Bell
# --------------------------------------------

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes
command_on_bell none

# --------------------------------------------
# Advanced
# --------------------------------------------

shell_integration enabled
allow_hyperlinks yes
term xterm-256color
macos_titlebar_color background
macos_option_as_alt no
macos_hide_from_tasks no
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_traditional_fullscreen no
macos_show_window_title_in all
macos_menubar_title_max_length 0
