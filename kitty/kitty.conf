# ============================================
# Kitty Configuration
# ============================================

# --------------------------------------------
# Fonts
# --------------------------------------------

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size 13.0

# Enable font features
font_features JetBrainsMonoNerdFont-Bold +zero +ss01 +ss02
font_features JetBrainsMonoNerdFont-Italic +zero +ss01 +ss02

# Disable ligatures
disable_ligatures never

# --------------------------------------------
# Cursor
# --------------------------------------------

cursor #fcee0a
cursor_text_color #0a0a0a
cursor_shape block
cursor_blink_interval 0

# --------------------------------------------
# Scrollback
# --------------------------------------------

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# --------------------------------------------
# Mouse
# --------------------------------------------

mouse_hide_wait 3.0
focus_follows_mouse no

# --------------------------------------------
# Performance
# --------------------------------------------

repaint_delay 10
input_delay 3
sync_to_monitor yes

# --------------------------------------------
# Window Layout
# --------------------------------------------

remember_window_size  yes
initial_window_width  120c
initial_window_height 35c
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0
draw_minimal_borders yes
window_margin_width 0
window_padding_width 4
placement_strategy center
active_border_color #00cfff
inactive_border_color #1a1a1a
bell_border_color #fcee0a

# --------------------------------------------
# Tabs
# --------------------------------------------

tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_style powerline
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┃"
tab_powerline_style slanted
tab_title_template "{title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}"
active_tab_title_template none
active_tab_foreground   #0a0a0a
active_tab_background   #fcee0a
active_tab_font_style   bold
inactive_tab_foreground #555555
inactive_tab_background #1a1a1a
inactive_tab_font_style normal
tab_bar_background #0a0a0a

# --------------------------------------------
# Colors (Cyberpunk 2077)
# --------------------------------------------

foreground #e0e0e0
background #0a0a0a
background_opacity 1.0
background_image none
dynamic_background_opacity no

# Selection
selection_foreground none
selection_background #1a1a1a

# Color scheme
# Black
color0  #0a0a0a
color8  #1a1a1a

# Red
color1  #ff2f6e
color9  #ff2f6e

# Green
color2  #00ff88
color10 #00ff88

# Yellow
color3  #fcee0a
color11 #fcee0a

# Blue
color4  #00cfff
color12 #00cfff

# Magenta
color5  #ff007a
color13 #ff007a

# Cyan
color6  #00cfff
color14 #7fdfff

# White
color7  #e0e0e0
color15 #ffffff

# URL
url_color #00cfff
url_style curly

# --------------------------------------------
# Bell
# --------------------------------------------

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes
command_on_bell none

# --------------------------------------------
# Advanced
# --------------------------------------------

shell_integration enabled
allow_hyperlinks yes
term xterm-256color
macos_titlebar_color background
macos_option_as_alt no
macos_hide_from_tasks no
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_traditional_fullscreen no
macos_show_window_title_in all
macos_menubar_title_max_length 0
